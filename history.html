<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Vault</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { margin-bottom: 15px; text-align: center; }
        .login-box { background: #1f1f1f; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; background: #333; color: #fff; }
        button { padding: 10px; background: #28a745; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #vault-content { display: none; margin-top: 20px; }
        .section { background: #1f1f1f; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .section h3 { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; color: #007bff; }
        .item { background: #2a2a2a; padding: 10px; border-radius: 6px; margin-bottom: 8px; word-break: break-word; }
        .item img, .item video { max-width: 100%; border-radius: 6px; margin-top: 5px; display: block; }
        .time { font-size: 0.75rem; color: #aaa; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 History Vault</h2>

    <div id="login-form" class="login-box">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="fetchHistory()">Access Vault</button>
    </div>

    <div id="vault-content">
        <div class="section">
            <h3>💬 Messages & Media Logs</h3>
            <div id="chat-list"></div>
        </div>

        <div class="section">
            <h3>📞 Call Logs</h3>
            <div id="call-list"></div>
        </div>
    </div>
</div>

<script>
async function fetchHistory() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    try {
        const response = await fetch('/api/history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });

        const data = await response.json();

        if (data.success) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('vault-content').style.display = 'block';

            const chatList = document.getElementById('chat-list');
            const callList = document.getElementById('call-list');

            chatList.innerHTML = data.chats.length ? '' : '<p>No messages yet.</p>';
            data.chats.forEach(item => {
                let mediaHtml = '';
                if (item.type === 'image') {
                    mediaHtml = `<img src="${item.content}" />`;
                } else if (item.type === 'video') {
                    mediaHtml = `<video src="${item.content}" controls></video>`;
                } else {
                    mediaHtml = `<p>${escapeHtml(item.content)}</p>`;
                }
                chatList.innerHTML += `<div class="item">${mediaHtml}<span class="time">${item.timestamp}</span></div>`;
            });

            callList.innerHTML = data.calls.length ? '' : '<p>No call logs yet.</p>';
            data.calls.forEach(item => {
                callList.innerHTML += `<div class="item"><p>${item.event}</p><span class="time">${item.timestamp}</span></div>`;
            });

        } else {
            alert(data.message);
        }
    } catch (err) {
        alert("Server error, please try again.");
    }
}

function escapeHtml(text) {
    return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
}
</script>

</body>
</html>
