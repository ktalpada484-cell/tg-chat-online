<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Blur - Secure History Vault</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #311042 50%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-card: rgba(255, 255, 255, 0.08);
            --accent-color: #a855f7;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; padding: 16px; }

        /* Login Screen Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .auth-box {
            background: var(--glass-card); border: 1px solid var(--glass-border);
            padding: 24px; border-radius: 20px; width: 90%; max-width: 350px;
            display: flex; flex-direction: column; gap: 14px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(14px);
        }
        .auth-box h2 { color: #e9d5ff; font-size: 1.3rem; margin-bottom: 4px; }
        .auth-input {
            width: 100%; padding: 12px 16px; border-radius: 24px; border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4); color: white; outline: none; font-size: 0.95rem;
        }
        .auth-btn {
            background: var(--accent-color); color: white; border: none; padding: 12px;
            border-radius: 24px; font-weight: 600; cursor: pointer; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        #error-msg { color: #fca5a5; font-size: 0.8rem; display: none; }

        /* Main History Dashboard */
        #dashboard { display: none; flex: 1; flex-direction: column; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 12px; border-bottom: 1px solid var(--glass-border); margin-bottom: 16px; 
        }
        h1 { font-size: 1.25rem; color: #e9d5ff; }
        a.back-btn { 
            color: white; background: var(--glass-bg); border: 1px solid var(--glass-border); 
            padding: 6px 14px; border-radius: 20px; text-decoration: none; font-size: 0.85rem; 
        }

        /* Filter Tabs Options */
        .filter-tabs {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px;
            scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: #d8b4fe;
            padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--accent-color); color: white; border-color: transparent;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        #history-container { flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }

        .history-card {
            background: var(--glass-card); backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: rgba(255,255,255,0.6); }
        .card-body { font-size: 0.95rem; word-break: break-word; }
        .media-preview { max-width: 100%; max-height: 200px; border-radius: 10px; object-fit: contain; cursor: pointer; margin-top: 4px; display: block; }

        .clear-container { text-align: center; margin-top: 10px; }
        .clear-btn { 
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); 
            color: #fca5a5; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-size: 0.9rem; 
        }
        .empty-state { text-align: center; color: rgba(255,255,255,0.4); margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Login Authentication Overlay -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 Vault Login</h2>
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.7);">Enter credentials to view history</p>
            <input type="text" id="username" class="auth-input" placeholder="Username">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <div id="error-msg">Galat Username ya Password!</div>
            <button class="auth-btn" onclick="verifyLogin()">Login</button>
            <a href="/" style="color: #c084fc; font-size: 0.85rem; text-decoration: none; margin-top: 4px;">⬅ Back to Chat</a>
        </div>
    </div>

    <!-- Main Protected Dashboard -->
    <div id="dashboard">
        <header>
            <h1>📜 Activity History</h1>
            <a href="/" class="back-btn">⬅ Chat</a>
        </header>

        <!-- Options / Filter Tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterHistory('all', this)">All</button>
            <button class="tab-btn" onclick="filterHistory('chat', this)">💬 Chats</button>
            <button class="tab-btn" onclick="filterHistory('call', this)">📞 Calls</button>
            <button class="tab-btn" onclick="filterHistory('image', this)">🖼️ Photos</button>
            <button class="tab-btn" onclick="filterHistory('video', this)">🎥 Videos</button>
        </div>

        <div id="history-container"></div>

        <div class="clear-container">
            <button class="clear-btn" onclick="clearHistory()">Clear Server History 🗑️</button>
        </div>
    </div>

    <script>
        let serverData = { chats: [], calls: [] };
        let currentFilter = 'all';

        async function verifyLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();
                if (result.success) {
                    serverData.chats = result.chats || [];
                    serverData.calls = result.calls || [];
                    
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    loadHistory('all');
                } else {
                    errorDiv.innerText = result.message || "Invalid Credentials";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = "Server connection error!";
                errorDiv.style.display = 'block';
            }
        }

        function loadHistory(filter = 'all') {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            let combinedList = [];

            if (filter === 'all' || filter === 'chat' || filter === 'image' || filter === 'video') {
                serverData.chats.forEach(item => {
                    if (filter === 'all' || 
                        (filter === 'chat' && item.type === 'text') || 
                        (filter === 'image' && item.type === 'image') || 
                        (filter === 'video' && item.type === 'video')) {
                        combinedList.push({ category: 'chat', data: item, time: item.timestamp });
                    }
                });
            }

            if (filter === 'all' || filter === 'call') {
                serverData.calls.forEach(item => {
                    combinedList.push({ category: 'call', data: item, time: item.timestamp });
                });
            }

            if (combinedList.length === 0) {
                container.innerHTML = `<div class="empty-state">No records found for "${filter}"</div>`;
                return;
            }

            combinedList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'history-card';

                let icon = '📝';
                let title = 'Activity';
                let contentHtml = '';

                if (item.category === 'call') {
                    icon = '📞';
                    title = item.data.event;
                    contentHtml = `<div class="card-body">Call log system event.</div>`;
                } else if (item.category === 'chat') {
                    if (item.data.type === 'image') {
                        icon = '🖼️';
                        title = 'Photo Shared';
                        contentHtml = `<img src="${item.data.content}" class="media-preview" onclick="window.open(this.src)" />`;
                    } else if (item.data.type === 'video') {
                        icon = '🎥';
                        title = 'Video Shared';
                        contentHtml = `<video src="${item.data.content}" class="media-preview" controls></video>`;
                    } else {
                        icon = '💬';
                        title = 'Message';
                        contentHtml = `<div class="card-body">${item.data.content}</div>`;
                    }
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span>${icon} <strong>${title}</strong></span>
                        <span>${item.time || ''}</span>
                    </div>
                    ${contentHtml}
                `;
                container.appendChild(card);
            });
        }

        function filterHistory(type, btnElement) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            loadHistory(type);
        }

        function clearHistory() {
            if (confirm("Clear server history logs?")) {
                serverData = { chats: [], calls: [] };
                loadHistory(currentFilter);
            }
        }
    </script>
</body>
</html>
