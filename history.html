<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat & Call History</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #311042 50%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-card: rgba(255, 255, 255, 0.1);
            --accent-color: #a855f7;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg-gradient); color: var(--text-color); }
        body { display: flex; flex-direction: column; }

        /* Login Screen */
        #login-container {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); padding: 30px; border-radius: 24px; width: 100%; max-width: 360px;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .login-box h2 { text-align: center; margin-bottom: 5px; font-size: 1.5rem; }
        .login-box input {
            padding: 12px 18px; border-radius: 26px; border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3); color: #ffffff; outline: none; font-size: 0.95rem;
        }
        .login-box button {
            background: var(--accent-color); color: white; border: none; padding: 12px 18px;
            border-radius: 26px; cursor: pointer; font-weight: 600; font-size: 1rem;
        }
        #error-msg { color: #ef4444; font-size: 0.85rem; text-align: center; min-height: 20px; }

        /* History Content Screen */
        #history-container {
            display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden;
        }
        header {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); padding: 16px; text-align: center;
            font-size: 1.2rem; font-weight: bold; flex-shrink: 0;
        }

        /* Filter Tabs */
        .tabs {
            display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background: rgba(0, 0, 0, 0.2); flex-shrink: 0;
        }
        .tab-btn {
            background: var(--glass-card); border: 1px solid var(--glass-border); color: white;
            padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 0.85rem; white-space: nowrap;
        }
        .tab-btn.active { background: var(--accent-color); border-color: var(--accent-color); }

        /* Logs List */
        #logs-box {
            flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        .log-item {
            background: var(--glass-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border); padding: 14px 16px; border-radius: 16px;
            display: flex; flex-direction: column; gap: 6px; word-break: break-word;
        }
        .log-item img, .log-item video { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 6px; }
        .log-time { font-size: 0.7rem; color: rgba(255, 255, 255, 0.6); text-align: right; }
    </style>
</head>
<body>

    <!-- Login View -->
    <div id="login-container">
        <div class="login-box">
            <h2>Vault Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Access History</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <!-- History View -->
    <div id="history-container">
        <header>📜 Secret History Vault</header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="filterLogs('all', this)">All</button>
            <button class="tab-btn" onclick="filterLogs('text', this)">Chats</button>
            <button class="tab-btn" onclick="filterLogs('call', this)">Calls</button>
            <button class="tab-btn" onclick="filterLogs('image', this)">Photos</button>
            <button class="tab-btn" onclick="filterLogs('video', this)">Videos</button>
        </div>

        <div id="logs-box"></div>
    </div>

    <script>
        let allData = { chats: [], calls: [] };
        let currentFilter = 'all';

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            errorMsg.innerText = "";

            try {
                const response = await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (result.success) {
                    allData.chats = result.chats || [];
                    allData.calls = result.calls || [];

                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('history-container').style.display = 'flex';
                    renderLogs();
                } else {
                    errorMsg.innerText = result.message || "Galat Username ya Password!";
                }
            } catch (err) {
                errorMsg.innerText = "Server connection error!";
            }
        }

        function filterLogs(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderLogs();
        }

        function renderLogs() {
            const box = document.getElementById('logs-box');
            box.innerHTML = '';

            let combined = [];

            if (currentFilter === 'all' || currentFilter === 'text' || currentFilter === 'image' || currentFilter === 'video') {
                let filteredChats = allData.chats;
                if (currentFilter !== 'all') {
                    filteredChats = allData.chats.filter(c => c.type === currentFilter);
                }
                combined = combined.concat(filteredChats.map(c => ({ ...c, category: 'chat' })));
            }

            if (currentFilter === 'all' || currentFilter === 'call') {
                combined = combined.concat(allData.calls.map(c => ({ ...c, type: 'call', category: 'call' })));
            }

            if (combined.length === 0) {
                box.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 40px;">No records found.</div>';
                return;
            }

            // Render items
            combined.forEach(item => {
                const div = document.createElement('div');
                div.className = 'log-item';

                let contentHtml = '';
                if (item.category === 'call') {
                    contentHtml = `<strong>📞 Call Log:</strong> ${item.event}`;
                } else {
                    if (item.type === 'image') {
                        contentHtml = `<strong>📷 Photo Message:</strong><br><img src="${item.content}" alt="Image" />`;
                    } else if (item.type === 'video') {
                        contentHtml = `<strong>🎥 Video Message:</strong><br><video src="${item.content}" controls></video>`;
                    } else {
                        contentHtml = `<strong>💬 Chat:</strong> ${item.content}`;
                    }
                }

                div.innerHTML = `${contentHtml}<span class="log-time">${item.timestamp}</span>`;
                box.appendChild(div);
            });
        }
    </script>
</body>
</html>
