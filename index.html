<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Purple Blur Glass Chat</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #311042 50%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-card: rgba(255, 255, 255, 0.1);
            --msg-sent: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --accent-color: #a855f7;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg-gradient); color: var(--text-color); }
        body { display: flex; flex-direction: column; position: relative; }

        header { 
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); padding: 12px 16px; 
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 50;
        }

        .header-actions { display: flex; align-items: center; gap: 8px; }
        .call-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);
            color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
        }

        #chat-box { 
            flex: 1; padding: 16px; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 14px; width: 100%;
        }

        .msg { 
            background: var(--glass-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 6px;
            max-width: 80%; word-break: break-word; align-self: flex-start;
        }

        .msg.sent { align-self: flex-end; background: var(--msg-sent); border: none; border-bottom-right-radius: 6px; }
        .msg img, .msg video { max-width: 100%; max-height: 240px; border-radius: 12px; margin-top: 6px; display: block; }
        .time { font-size: 0.65rem; color: rgba(255, 255, 255, 0.7); text-align: right; margin-top: 4px; display: block; }

        #input-area { 
            padding: 12px 16px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); display: flex; gap: 10px; align-items: center;
        }

        input[type="text"] { 
            flex: 1; padding: 12px 18px; border-radius: 26px; border: 1px solid var(--glass-border); 
            background: rgba(0, 0, 0, 0.3); color: #ffffff; outline: none;
        }

        button, label.btn { 
            background: var(--accent-color); color: white; border: none; padding: 12px 18px; 
            border-radius: 26px; cursor: pointer; font-weight: 600;
        }
        input[type="file"] { display: none; }

        /* Call Screen Overlay */
        #call-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); z-index: 999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #call-modal.active { display: flex; }

        .video-container {
            position: relative; width: 90%; max-width: 400px; height: 60vh;
            background: #000; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border);
        }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video {
            position: absolute; bottom: 12px; right: 12px; width: 100px; height: 140px;
            object-fit: cover; border-radius: 12px; border: 2px solid #fff;
        }
        .call-controls { margin-top: 20px; display: flex; gap: 15px; }
        .btn-end { background: #ef4444 !important; }
        .btn-accept { background: #22c55e !important; }

        #incoming-call-box {
            display: none; position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 27, 75, 0.95); border: 1px solid var(--accent-color);
            padding: 12px 20px; border-radius: 30px; z-index: 1000; gap: 12px; align-items: center;
        }
        #incoming-call-box.active { display: flex; }
    </style>
</head>
<body>

    <header>
        <div id="status">🟣 Purple Blur Active</div>
        <div class="header-actions">
            <button class="call-btn" onclick="startCall(false)">📞</button>
            <button class="call-btn" onclick="startCall(true)">📹</button>
        </div>
    </header>

    <div id="incoming-call-box">
        <span id="incoming-text">Incoming Call...</span>
        <button class="btn-accept" onclick="acceptCall()">Answer</button>
        <button class="btn-end" onclick="rejectCall()">Reject</button>
    </div>

    <div id="call-modal">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="btn-end" onclick="endCall()">End Call 🔴</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <label for="file-input" class="btn">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*" onchange="sendFile()">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendText()">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        try { if (typeof io !== 'undefined') socket = io(); } catch(e){}

        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const fileInput = document.getElementById('file-input');

        let localStream = null;
        let peerConnection = null;
        let incomingOffer = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function handleKeyPress(e) { if (e.key === 'Enter') sendText(); }

        if (socket) {
            socket.on('message', (data) => renderMessage(data, false));
            socket.on('incoming-call', (data) => {
                incomingOffer = data.offer;
                document.getElementById('incoming-text').innerText = data.isVideo ? "Incoming Video Call..." : "Incoming Voice Call...";
                document.getElementById('incoming-call-box').classList.add('active');
            });
            socket.on('call-answered', async (data) => {
                if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            });
            socket.on('ice-candidate', async (data) => {
                if (peerConnection && data.candidate) {
                    try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch (e) {}
                }
            });
            socket.on('call-ended', () => closeCallUI());
        }

        function sendText() {
            const text = msgInput.value.trim();
            if (!text) return;
            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const payload = { type: 'text', content: text, timestamp: timeString };

            if (socket) socket.emit('chat-message', payload);
            renderMessage(payload, true);
            msgInput.value = '';
        }

        function sendFile() {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const isImage = file.type.startsWith('image/');
                const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const payload = { type: isImage ? 'image' : 'video', content: e.target.result, timestamp: timeString };

                if (socket) socket.emit('chat-message', payload);
                renderMessage(payload, true);
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function renderMessage(data, isSent) {
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : ''}`;
            
            let contentHtml = '';
            if (data.type === 'image') {
                contentHtml = `<img src="${data.content}" alt="Image" onclick="window.open(this.src)" />`;
            } else if (data.type === 'video') {
                contentHtml = `<video src="${data.content}" controls></video>`;
            } else {
                contentHtml = `<p>${data.content}</p>`;
            }

            div.innerHTML = `${contentHtml}<span class="time">${data.timestamp}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function startCall(isVideo) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('call-modal').classList.add('active');

                createPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                if (socket) socket.emit('call-user', { offer, isVideo });
            } catch (err) {
                alert("Camera/Mic access Error!");
            }
        }

        async function acceptCall() {
            document.getElementById('incoming-call-box').classList.remove('active');
            document.getElementById('call-modal').classList.add('active');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;

                createPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                if (socket) socket.emit('answer-call', { answer });
            } catch (err) {
                endCall();
            }
        }

        function rejectCall() {
            document.getElementById('incoming-call-box').classList.remove('active');
            if (socket) socket.emit('end-call');
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && socket) socket.emit('ice-candidate', event.candidate);
            };
        }

        function endCall() {
            if (socket) socket.emit('end-call');
            closeCallUI();
        }

        function closeCallUI() {
            document.getElementById('call-modal').classList.remove('active');
            document.getElementById('incoming-call-box').classList.remove('active');
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        }
    </script>
</body>
</html>
