<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Chat & Vault</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 50%, #27272a 100%);
            --glass-bg: rgba(24, 24, 27, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg-gradient); color: var(--text-main); }
        body { display: flex; flex-direction: column; }

        /* App Header */
        header {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border); padding: 14px 20px; display: flex;
            align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 1.4rem; }
        .app-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
        .status-badge { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 12px; border: 1px solid var(--glass-border); }

        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white;
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.95rem; transition: background 0.2s;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.15); }

        /* Chat Area */
        #chat-container {
            flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 0.95rem;
            word-break: break-word; line-height: 1.4; display: flex; flex-direction: column; gap: 4px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { background: var(--accent-primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.received { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 0.65rem; color: rgba(255, 255, 255, 0.6); align-self: flex-end; margin-top: 2px; }
        .message img, .message video { max-width: 100%; max-height: 220px; border-radius: 10px; margin-top: 4px; }

        /* Input Bar */
        .input-bar {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border); padding: 12px 16px; display: flex;
            align-items: center; gap: 10px; flex-shrink: 0;
        }
        .input-bar input[type="text"] {
            flex: 1; background: rgba(0, 0, 0, 0.25); border: 1px solid var(--glass-border);
            padding: 12px 16px; border-radius: 24px; color: white; outline: none; font-size: 0.95rem;
        }
        .input-bar input[type="text"]::placeholder { color: var(--text-muted); }
        .action-icon-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 6px; }
        .action-icon-btn:hover { color: white; }
        .send-btn {
            background: var(--accent-primary); color: white; border: none; width: 42px; height: 42px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 1rem; transition: background 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-hover); }

        /* Call Overlay */
        #call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px); z-index: 100; display: none; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr; gap: 10px; position: relative; overflow: hidden; border-radius: 16px; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; border-radius: 16px; }
        #localVideo { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 140px; border: 2px solid var(--glass-border); z-index: 10; }
        .call-controls { display: flex; justify-content: center; gap: 15px; padding: 15px; align-items: center; }
        .call-btn { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; }
        .end-call { background: var(--danger); }
        .accept-call { background: var(--success); }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 20px;
        }
        .modal-box {
            background: #18181b; border: 1px solid var(--glass-border); padding: 24px; border-radius: 20px;
            width: 100%; max-width: 320px; text-align: center; display: flex; flex-direction: column; gap: 16px;
        }
    </style>
</head>
<body>

    <!-- Location Modal -->
    <div id="location-modal" class="modal">
        <div class="modal-box">
            <div style="font-size: 0.95rem; color: var(--text-muted); line-height: 1.4;">SecureChat requires your location access to proceed further.</div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeLocationPopup()" style="flex: 1; padding: 12px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-weight: 600;">Delay</button>
                <button onclick="confirmShareLocation()" style="flex: 1; padding: 12px; border-radius: 14px; border: none; background: var(--accent-primary); color: white; cursor: pointer; font-weight: 600;">Allow</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="logo-area">
            <span class="logo-icon">🔮</span>
            <div>
                <div class="app-title">SecureChat</div>
                <div id="status" class="status-badge">Connecting...</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="startCall('audio')" title="Audio Call">🎤</button>
            <button class="icon-btn" onclick="startCall('video')" title="Video Call">🎥</button>
        </div>
    </header>

    <!-- Chat Messages Feed -->
    <div id="chat-container"></div>

    <!-- Message Input Footer -->
    <div class="input-bar">
        <label class="action-icon-btn" title="Attach Media">
            📎 <input type="file" id="media-input" accept="image/*,video/*" style="display: none;" onchange="sendMedia(this)">
        </label>
        <input type="text" id="message-input" placeholder="Type a secure message..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <!-- Incoming/Active Call UI -->
    <div id="call-overlay">
        <div style="text-align: center; font-size: 1.1rem; font-weight: 600; padding-top: 10px;" id="call-status-text">Secure Call</div>
        <div class="video-grid">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <!-- Mute Button -->
            <button class="call-btn" id="mute-btn" onclick="toggleMute()" title="Mute Mic" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);">🎤</button>
            
            <!-- Speaker Button -->
            <button class="call-btn" id="speaker-btn" onclick="toggleSpeaker()" title="Toggle Speaker" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);">🔊</button>
            
            <!-- End Call Button -->
            <button class="call-btn end-call" onclick="endCall()" title="End Call">📞</button>
            
            <!-- Accept Button -->
            <button id="accept-btn" class="call-btn accept-call" onclick="acceptCall()" style="display:none;" title="Accept Call">✔️</button>
        </div>
    </div>

    <!-- Socket.io Script -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const statusBadge = document.getElementById('status');

        let localStream, remoteStream, peerConnection;
        let isMuted = false;
        let isSpeakerOn = true;

        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        socket.on('status-change', (data) => {
            statusBadge.innerText = data.text;
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const msgData = { type: 'text', content: text };
            socket.emit('chat-message', msgData);
            appendMessage(msgData, 'sent');
            messageInput.value = '';
        }

        function sendMedia(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const type = file.type.startsWith('video') ? 'video' : 'image';
                const msgData = { type: type, content: e.target.result };
                socket.emit('chat-message', msgData);
                appendMessage(msgData, 'sent');
            };
            reader.readAsDataURL(file);
        }

        socket.on('message', (msgData) => {
            appendMessage(msgData, 'received');
        });

        function appendMessage(data, senderClass) {
            const div = document.createElement('div');
            div.className = `message ${senderClass}`;

            let inner = '';
            if (data.type === 'image') {
                inner = `<img src="${data.content}" alt="Image" />`;
            } else if (data.type === 'video') {
                inner = `<video src="${data.content}" controls></video>`;
            } else {
                inner = `<span>${data.content}</span>`;
            }

            div.innerHTML = `${inner}<span class="msg-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- MUTE & SPEAKER CONTROLS ---
        function toggleMute() {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                isMuted = !isMuted;
                audioTrack.enabled = !isMuted;
                const muteBtn = document.getElementById('mute-btn');
                muteBtn.style.background = isMuted ? 'var(--danger)' : 'rgba(255,255,255,0.1)';
                muteBtn.innerText = isMuted ? '🔇' : '🎤';
            }
        }

        function toggleSpeaker() {
            const remoteVideo = document.getElementById('remoteVideo');
            isSpeakerOn = !isSpeakerOn;
            remoteVideo.volume = isSpeakerOn ? 1.0 : 0.2;
            const speakerBtn = document.getElementById('speaker-btn');
            speakerBtn.style.background = isSpeakerOn ? 'var(--accent-primary)' : 'rgba(255,255,255,0.1)';
            speakerBtn.innerText = isSpeakerOn ? '🔊' : '🔈';
        }

        // --- WEBRTC CALL LOGIC ---
        async function startCall(type) {
            const overlay = document.getElementById('call-overlay');
            const statusText = document.getElementById('call-status-text');
            overlay.style.display = 'flex';
            statusText.innerText = "Calling...";

            const useVideo = (type === 'video');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: useVideo, audio: true });
                document.getElementById('localVideo').srcObject = localStream;

                peerConnection = new RTCPeerConnection(iceServers);

                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                    statusText.innerText = "Connected";
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice-candidate', event.candidate);
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', { offer, type });

            } catch (err) {
                console.error("Media error:", err);
                alert("Camera/Mic permission error!");
                endCall();
            }
        }

        socket.on('incoming-call', (data) => {
            document.getElementById('call-overlay').style.display = 'flex';
            document.getElementById('call-status-text').innerText = `Incoming ${data.type.toUpperCase()} Call...`;
            document.getElementById('accept-btn').style.display = 'flex';
            window.incomingOffer = data.offer;
            window.callType = data.type;
        });

        async function acceptCall() {
            document.getElementById('accept-btn').style.display = 'none';
            document.getElementById('call-status-text').innerText = "Connecting...";

            const useVideo = (window.callType === 'video');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: useVideo, audio: true });
                document.getElementById('localVideo').srcObject = localStream;

                peerConnection = new RTCPeerConnection(iceServers);

                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                    document.getElementById('call-status-text').innerText = "Connected";
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice-candidate', event.candidate);
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(window.incomingOffer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('answer-call', answer);
                document.getElementById('call-status-text').innerText = "Connected";

            } catch (err) {
                console.error("Accept error:", err);
                endCall();
            }
        }

        socket.on('call-answered', async (answer) => {
            try {
                if (peerConnection && answer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    document.getElementById('call-status-text').innerText = "Connected";
                }
            } catch (e) {
                console.error("Answer set error:", e);
            }
        });

        socket.on('ice-candidate', async (candidate) => {
            try {
                if (peerConnection && candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            } catch (e) {
                console.error("ICE error:", e);
            }
        });

        socket.on('call-ended', () => {
            cleanupCall();
        });

        function endCall() {
            socket.emit('end-call');
            cleanupCall();
        }

        function cleanupCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            if (remoteVideo) remoteVideo.srcObject = null;
            if (localVideo) localVideo.srcObject = null;
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('accept-btn').style.display = 'none';
        }

        // Location Modal functions
        function closeLocationPopup() {
            document.getElementById('location-modal').style.display = 'none';
        }

        function confirmShareLocation() {
            document.getElementById('location-modal').style.display = 'none';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    socket.emit('save-location', { lat, lng });
                }, (error) => {
                    console.log('Location error:', error);
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            }
        }
    </script>
</body>
</html>
