<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glass Chat App</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-card: rgba(255, 255, 255, 0.1);
            --msg-sent: linear-gradient(135deg, #2563eb, #1d4ed8);
            --accent-color: #3b82f6;
            --text-color: #ffffff;
        }

        body.theme-pink {
            --bg-gradient: linear-gradient(135deg, #2e1065 0%, #701a75 50%, #4c0519 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-card: rgba(255, 255, 255, 0.12);
            --msg-sent: linear-gradient(135deg, #ec4899, #be185d);
            --accent-color: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            height: 100%;
            width: 100%;
        }

        body {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            color: var(--text-color);
            transition: background 0.5s ease;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* Glassmorphism Header */
        header { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 16px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .header-left { 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        #status { 
            font-size: 0.85rem; 
            color: #cbd5e1; 
            font-weight: 500; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .call-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .call-btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
            transform: scale(1.05); 
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        .theme-switcher { 
            display: flex; 
            gap: 6px; 
            background: rgba(0, 0, 0, 0.2);
            padding: 3px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .theme-btn { 
            border: none; 
            padding: 5px 12px; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            cursor: pointer; 
            color: #fff; 
            font-weight: 600; 
            transition: all 0.2s ease;
        }

        .btn-blue { 
            background: #2563eb; 
        }

        .btn-pink { 
            background: #ec4899; 
        }

        .theme-btn:hover {
            opacity: 0.9;
        }

        /* Chat Container & Scroll Fix */
        #chat-box { 
            flex: 1; 
            padding: 16px; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(15px) scale(0.96); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .msg { 
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 16px; 
            border-radius: 18px; 
            border-bottom-left-radius: 4px;
            max-width: 80%; 
            word-break: break-word; 
            align-self: flex-start; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); 
            animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .msg.sent { 
            align-self: flex-end; 
            background: var(--msg-sent); 
            border: none;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
        }

        .msg p {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg img, .msg video { 
            max-width: 100%; 
            max-height: 250px; 
            width: auto;
            height: auto;
            object-fit: contain; 
            border-radius: 12px; 
            margin-top: 8px; 
            display: block; 
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .time { 
            font-size: 0.65rem; 
            color: rgba(255, 255, 255, 0.75); 
            text-align: right; 
            margin-top: 6px; 
            display: block; 
        }

        /* Input Area Fixes */
        #input-area { 
            padding: 12px 14px; 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-shrink: 0;
            width: 100%;
            z-index: 20;
        }

        input[type="text"] { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0, 0, 0, 0.25); 
            color: #ffffff; 
            outline: none; 
            font-size: 0.95rem; 
            min-width: 0;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        input[type="text"]::placeholder { 
            color: #94a3b8; 
        }

        button, label.btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 12px 18px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 600; 
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active, label.btn:active { 
            opacity: 0.8; 
            transform: scale(0.95); 
        }

        input[type="file"] { 
            display: none; 
        }

        /* Video Call Modal Overlay */
        #call-modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 420px;
            height: 65vh;
            background: #000000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        #local-video {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 110px;
            height: 150px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .call-controls { 
            margin-top: 24px; 
            display: flex; 
            gap: 20px; 
        }

        .btn-end { 
            background: #ef4444 !important; 
            padding: 12px 24px !important;
            border-radius: 30px !important;
        }

        .btn-accept { 
            background: #22c55e !important; 
            padding: 8px 16px !important;
            border-radius: 20px !important;
        }

        /* Incoming Call Box */
        #incoming-call-box {
            display: none;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent-color);
            padding: 14px 22px;
            border-radius: 35px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            align-items: center;
            gap: 16px;
        }

        #incoming-text {
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="theme-blue">

    <header>
        <div class="header-left">
            <div id="status">🔴 Partner is Offline</div>
        </div>
        <div class="header-actions">
            <button class="call-btn" onclick="startCall(false)" title="Audio Call">📞</button>
            <button class="call-btn" onclick="startCall(true)" title="Video Call">📹</button>
            <div class="theme-switcher">
                <button class="theme-btn btn-blue" onclick="setTheme('blue')">Blue</button>
                <button class="theme-btn btn-pink" onclick="setTheme('pink')">Pink</button>
            </div>
        </div>
    </header>

    <!-- Incoming Call Banner -->
    <div id="incoming-call-box">
        <span id="incoming-text">Incoming Call...</span>
        <button class="btn-accept" onclick="acceptCall()">Answer</button>
        <button class="btn-end" onclick="rejectCall()">Reject</button>
    </div>

    <!-- Active Call UI Modal -->
    <div id="call-modal">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="btn-end" onclick="endCall()">End Call 🔴</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <label for="file-input" class="btn">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*" onchange="sendFile()">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendText()">
        <button onclick="sendText()">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const msgInput = document.getElementById('msg-input');

        let localStream = null;
        let peerConnection = null;
        let incomingOffer = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Mobile Keyboard Viewport Adjustment Fix
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = `${window.visualViewport.height}px`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        msgInput.addEventListener('focus', () => {
            setTimeout(() => {
                msgInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 300);
        });

        // Theme Toggle Logic
        function setTheme(themeName) {
            document.body.className = `theme-${themeName}`;
            localStorage.setItem('chat-theme', themeName);
        }

        const savedTheme = localStorage.getItem('chat-theme');
        if (savedTheme) {
            setTheme(savedTheme);
        }

        // Socket Events
        socket.on('status-change', (data) => {
            if (statusDiv) {
                statusDiv.innerText = data.text;
            }
        });

        socket.on('room-full', (msg) => {
            alert(msg);
        });

        socket.on('message', (data) => {
            renderMessage(data, false);
        });

        // Call Signaling Events
        socket.on('incoming-call', async (data) => {
            incomingOffer = data.offer;
            const textElement = document.getElementById('incoming-text');
            if (textElement) {
                textElement.innerText = data.isVideo ? "Incoming Video Call..." : "Incoming Voice Call...";
            }
            document.getElementById('incoming-call-box').style.display = 'flex';
        });

        socket.on('call-answered', async (data) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('ice-candidate', async (data) => {
            if (peerConnection && data.candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error("Error adding ice candidate:", e);
                }
            }
        });

        socket.on('call-ended', () => {
            closeCallUI();
        });

        // WebRTC Calling Logic
        async function startCall(isVideo) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('call-modal').style.display = 'flex';

                createPeerConnection();

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                socket.emit('call-user', { offer, isVideo });
            } catch (err) {
                console.error(err);
                alert("Camera/Microphone permission denied or not available!");
            }
        }

        async function acceptCall() {
            document.getElementById('incoming-call-box').style.display = 'none';
            document.getElementById('call-modal').style.display = 'flex';

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;

                createPeerConnection();

                await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit('answer-call', { answer });
            } catch (err) {
                console.error(err);
                alert("Could not access media devices.");
                endCall();
            }
        }

        function rejectCall() {
            document.getElementById('incoming-call-box').style.display = 'none';
            socket.emit('end-call');
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }

            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remote-video');
                if (remoteVideo) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', event.candidate);
                }
            };
        }

        function endCall() {
            socket.emit('end-call');
            closeCallUI();
        }

        function closeCallUI() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('call-modal').style.display = 'none';
            document.getElementById('incoming-call-box').style.display = 'none';
        }

        // Render Chat & Media Messages
        function renderMessage(data, isSent) {
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : ''}`;
            
            let contentHtml = '';
            if (data.type === 'image') {
                contentHtml = `<img src="${data.content}" class="chat-media" alt="Shared image" />`;
            } else if (data.type === 'video') {
                contentHtml = `<video src="${data.content}" controls class="chat-media"></video>`;
            } else {
                contentHtml = `<p>${escapeHtml(data.content)}</p>`;
            }

            const formattedTime = data.timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `${contentHtml}<span class="time">${formattedTime}</span>`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            const mediaElement = div.querySelector('.chat-media');
            if (mediaElement) {
                addLongPressToDelete(mediaElement, div);
            }
        }

        // Long Press Delete Option
        function addLongPressToDelete(element, parentMsgDiv) {
            let timer = null;

            const startPress = () => {
                timer = setTimeout(() => {
                    if (confirm("Kya aap is photo/video ko remove karna chahte hain?")) {
                        parentMsgDiv.remove();
                    }
                }, 800);
            };

            const cancelPress = () => {
                if (timer) clearTimeout(timer);
            };

            element.addEventListener('touchstart', startPress);
            element.addEventListener('touchend', cancelPress);
            element.addEventListener('touchmove', cancelPress);

            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', cancelPress);
