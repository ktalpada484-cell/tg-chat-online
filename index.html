<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glass Chat App</title>
    <style>
        /* ==========================================
           1. ROOT VARIABLES & THEMES
           ========================================== */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-card: rgba(255, 255, 255, 0.12);
            --msg-sent: linear-gradient(135deg, #2563eb, #1d4ed8);
            --accent-color: #3b82f6;
            --text-color: #ffffff;
        }

        body.theme-pink {
            --bg-gradient: linear-gradient(135deg, #2e1065 0%, #701a75 50%, #4c0519 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-card: rgba(255, 255, 255, 0.15);
            --msg-sent: linear-gradient(135deg, #ec4899, #be185d);
            --accent-color: #ec4899;
        }

        /* ==========================================
           2. GLOBAL RESET & BASE STYLES
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            width: 100%;
        }

        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            color: var(--text-color);
            transition: background 0.5s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ==========================================
           3. GLASSMORPHISM HEADER
           ========================================== */
        header { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 14px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .header-left { 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        #status { 
            font-size: 0.85rem; 
            color: #cbd5e1; 
            font-weight: 500; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .call-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
            z-index: 101;
        }

        .call-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .call-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }

        .theme-switcher { 
            display: flex; 
            gap: 4px; 
            background: rgba(0, 0, 0, 0.2);
            padding: 3px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .theme-btn { 
            border: none; 
            padding: 5px 10px; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            cursor: pointer; 
            color: #fff; 
            font-weight: 600; 
            outline: none;
            transition: opacity 0.2s ease;
        }

        .theme-btn:hover {
            opacity: 0.8;
        }

        .btn-blue { 
            background: #2563eb; 
        }

        .btn-pink { 
            background: #ec4899; 
        }

        /* ==========================================
           4. CHAT CONTAINER & MESSAGES
           ========================================== */
        #chat-box { 
            flex: 1; 
            padding: 14px; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(12px) scale(0.96); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .msg { 
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 10px 14px; 
            border-radius: 18px; 
            border-bottom-left-radius: 4px;
            max-width: 80%; 
            word-break: break-word; 
            align-self: flex-start; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); 
            animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .msg.sent { 
            align-self: flex-end; 
            background: var(--msg-sent); 
            border: none;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
        }

        .msg p {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg img, .msg video { 
            max-width: 100%; 
            max-height: 240px; 
            width: auto;
            height: auto;
            object-fit: contain; 
            border-radius: 12px; 
            margin-top: 6px; 
            display: block; 
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .time { 
            font-size: 0.65rem; 
            color: rgba(255, 255, 255, 0.75); 
            text-align: right; 
            margin-top: 4px; 
            display: block; 
        }

        /* ==========================================
           5. INPUT BAR & FOOTER
           ========================================== */
        #input-area { 
            padding: 10px 12px; 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            display: flex; 
            gap: 8px; 
            align-items: center; 
            flex-shrink: 0;
            width: 100%;
            z-index: 100;
        }

        input[type="text"] { 
            flex: 1; 
            padding: 10px 16px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0, 0, 0, 0.3); 
            color: #ffffff; 
            outline: none; 
            font-size: 0.95rem; 
            min-width: 0;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        input[type="text"]::placeholder { 
            color: #94a3b8; 
        }

        button, label.btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 600; 
            flex-shrink: 0;
            outline: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        button:active, label.btn:active { 
            opacity: 0.8; 
            transform: scale(0.95); 
        }

        input[type="file"] { 
            display: none; 
        }

        /* ==========================================
           6. WEBRTC CALL MODAL & OVERLAYS
           ========================================== */
        #call-modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 60vh;
            background: #000000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        #local-video {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 100px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .call-controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 15px; 
        }

        .btn-end { 
            background: #ef4444 !important; 
            padding: 10px 20px !important;
            border-radius: 25px !important;
        }

        .btn-accept { 
            background: #22c55e !important; 
            padding: 6px 14px !important;
            border-radius: 20px !important;
        }

        /* ==========================================
           7. INCOMING CALL NOTIFICATION
           ========================================== */
        #incoming-call-box {
            display: none;
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent-color);
            padding: 10px 18px;
            border-radius: 30px;
            z-index: 10000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            align-items: center;
            gap: 12px;
        }

        #incoming-text {
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="theme-blue">

    <!-- Header Section -->
    <header>
        <div class="header-left">
            <div id="status">🔴 Partner is Offline</div>
        </div>
        <div class="header-actions">
            <button type="button" class="call-btn" id="audio-call-btn" title="Audio Call">📞</button>
            <button type="button" class="call-btn" id="video-call-btn" title="Video Call">📹</button>
            <div class="theme-switcher">
                <button type="button" class="theme-btn btn-blue" onclick="setTheme('blue')">Blue</button>
                <button type="button" class="theme-btn btn-pink" onclick="setTheme('pink')">Pink</button>
            </div>
        </div>
    </header>

    <!-- Incoming Call Banner Overlay -->
    <div id="incoming-call-box">
        <span id="incoming-text">Incoming Call...</span>
        <button type="button" class="btn-accept" id="accept-call-btn">Answer</button>
        <button type="button" class="btn-end" id="reject-call-btn">Reject</button>
    </div>

    <!-- Active WebRTC Video Call Screen -->
    <div id="call-modal">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button type="button" class="btn-end" id="end-call-btn">End Call 🔴</button>
        </div>
    </div>

    <!-- Main Messages Scroll Container -->
    <div id="chat-box"></div>

    <!-- Footer Input Bar -->
    <div id="input-area">
        <label for="file-input" class="btn">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*">
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button type="button" id="send-btn">Send</button>
    </div>

    <!-- Socket.io Library -->
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        /* ==========================================
           8. JAVASCRIPT INITIALIZATION
           ========================================== */
        const socket = typeof io !== 'undefined' ? io() : null;
        
        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        
        const audioCallBtn = document.getElementById('audio-call-btn');
        const videoCallBtn = document.getElementById('video-call-btn');
        const acceptCallBtn = document.getElementById('accept-call-btn');
        const rejectCallBtn = document.getElementById('reject-call-btn');
        const endCallBtn = document.getElementById('end-call-btn');

        let localStream = null;
        let peerConnection = null;
        let incomingOffer = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        /* ==========================================
           9. THEME MANAGEMENT
           ========================================== */
        function setTheme(themeName) {
            document.body.className = `theme-${themeName}`;
            localStorage.setItem('chat-theme', themeName);
        }

        const savedTheme = localStorage.getItem('chat-theme');
        if (savedTheme) {
            setTheme(savedTheme);
        }

        /* ==========================================
           10. MOBILE KEYBOARD & VISUAL VIEWPORT FIX
           ========================================== */
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = `${window.visualViewport.height}px`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        msgInput.addEventListener('focus', () => {
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 300);
        });

        /* ==========================================
           11. EVENT LISTENERS
           ========================================== */
        sendBtn.addEventListener('click', sendText);

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendText();
            }
        });

        fileInput.addEventListener('change', sendFile);

        audioCallBtn.addEventListener('click', () => startCall(false));
        videoCallBtn.addEventListener('click', () => startCall(true));
        acceptCallBtn.addEventListener('click', acceptCall);
        rejectCallBtn.addEventListener('click', rejectCall);
        endCallBtn.addEventListener('click', endCall);

        /* ==========================================
           12. SOCKET.IO EVENT HANDLERS
           ========================================== */
        if (socket) {
            socket.on('status-change', (data) => {
                if (statusDiv) {
                    statusDiv.innerText = data.text;
                }
            });

            socket.on('room-full', (msg) => {
                alert(msg);
            });

            socket.on('message', (data) => {
                renderMessage(data, false);
            });

            socket.on('incoming-call', async (data) => {
                incomingOffer = data.offer;
                const incomingText = document.getElementById('incoming-text');
                if (incomingText) {
                    incomingText.innerText = data.isVideo ? "Incoming Video Call..." : "Incoming Voice Call...";
                }
                document.getElementById('incoming-call-box').style.display = 'flex';
            });

            socket.on('call-answered', async (data) => {
                if (peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            socket.on('ice-candidate', async (data) => {
                if (peerConnection && data.candidate) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    } catch (e) {
                        console.error("Ice candidate error:", e);
                    }
                }
            });

            socket.on('call-ended', () => {
                closeCallUI();
            });
        }

        /* ==========================================
           13. MESSAGE SENDING & RENDERING LOGIC
           ========================================== */
        function sendText() {
            const text = msgInput.value.trim();
            if (!text) return;

            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const payload = { type: 'text', content: text, timestamp: timeString };

            if (socket) {
                socket.emit('chat-message', payload);
            }
            renderMessage(payload, true);
            msgInput.value = '';
            msgInput.focus();
        }

        function sendFile() {
            const file = fileInput.files[0];
            if (!file) return;

            if (file.size > 9 * 1024 * 1024) {
                alert("File size 9MB se kam honi chahiye!");
                fileInput.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const isImage = file.type.startsWith('image/');
                const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const payload = {
                    type: isImage ? 'image' : 'video',
                    content: e.target.result,
                    timestamp: timeString
                };
                
                if (socket) {
                    socket.emit('chat-message', payload);
                }
                renderMessage(payload, true);
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function renderMessage(data, isSent) {
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : ''}`;
            
            let contentHtml = '';
            if (data.type === 'image') {
                contentHtml = `<img src="${data.content}" class="chat-media" alt="Shared media" />`;
            } else if (data.type === 'video') {
                contentHtml = `<video src="${data.content}" controls class="chat-medi
