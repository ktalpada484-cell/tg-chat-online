<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Chat Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1f1f1f; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #333; }
        #status { font-size: 0.9rem; color: #aaa; margin-top: 5px; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #262626; padding: 10px; border-radius: 8px; max-width: 80%; word-break: break-word; }
        .msg.sent { align-self: flex-end; background: #007bff; }
        .msg img, .msg video { max-width: 100%; border-radius: 6px; margin-top: 5px; display: block; }
        .time { font-size: 0.7rem; color: #ddd; text-align: right; margin-top: 4px; display: block; }
        #input-area { padding: 10px; background: #1f1f1f; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #333; color: #fff; outline: none; }
        button, label.btn { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <header>
        TG Chat Online
        <div id="status">🔴 Partner is Offline</div>
    </header>

    <div id="chat-box"></div>

    <div id="input-area">
        <label for="file-input" class="btn">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*" onchange="sendFile()">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendText()">
        <button onclick="sendText()">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');

        socket.on('status-change', (data) => {
            statusDiv.innerText = data.text;
        });

        socket.on('room-full', (msg) => {
            alert(msg);
        });

        socket.on('message', (data) => {
            renderMessage(data, false);
        });

        function renderMessage(data, isSent) {
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : ''}`;
            
            let contentHtml = '';
            if (data.type === 'image') {
                contentHtml = `<img src="${data.content}" />`;
            } else if (data.type === 'video') {
                contentHtml = `<video src="${data.content}" controls></video>`;
            } else {
                contentHtml = `<p>${escapeHtml(data.content)}</p>`;
            }

            div.innerHTML = `${contentHtml}<span class="time">${data.timestamp || new Date().toLocaleTimeString()}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const payload = { type: 'text', content: text, timestamp: new Date().toLocaleTimeString() };
            socket.emit('chat-message', payload);
            renderMessage(payload, true);
            input.value = '';
        }

        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return;

            if (file.size > 9 * 1024 * 1024) {
                alert("File size must be under 9MB!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const isImage = file.type.startsWith('image/');
                const payload = {
                    type: isImage ? 'image' : 'video',
                    content: e.target.result,
                    timestamp: new Date().toLocaleTimeString()
                };
                socket.emit('chat-message', payload);
                renderMessage(payload, true);
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
