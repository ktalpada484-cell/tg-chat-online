<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat & Call</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; background: rgba(30, 30, 30, 0.8); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; height: 80vh; }
        #status-bar { color: #aaa; font-size: 13px; text-align: center; padding-bottom: 10px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .call-controls { display: flex; justify-content: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 12px; }
        .btn-call { background: #28a745; }
        .btn-hangup { background: #dc3545; display: none; }
        .btn-speaker { background: #6c757d; display: none; }
        .btn-speaker.active { background: #00f2fe; color: #000; }
        .btn-answer { background: #ffc107; color: black; display: none; }
        .messages { flex-grow: 1; overflow-y: auto; padding: 10px; margin: 10px 0; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 10px; max-width: 70%; word-wrap: break-word; font-size: 13px; }
        .time { font-size: 9px; opacity: 0.6; display: block; margin-top: 2px; text-align: right; }
        .sent { background: #00adb5; margin-left: auto; }
        .received { background: rgba(255,255,255,0.1); }
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex-grow: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; outline: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="status-bar">
            <span id="status-text">Connecting...</span>
        </div>
        
        <div class="call-controls">
            <button id="call-btn" class="btn btn-call" onclick="startCall()">📞 Call</button>
            <button id="answer-btn" class="btn btn-answer" onclick="answerCall()">📞 Answer</button>
            <button id="speaker-btn" class="btn btn-speaker" onclick="toggleSpeaker()">📢 Speaker</button>
            <button id="hangup-btn" class="btn btn-hangup" onclick="endCall()">❌ End</button>
        </div>

        <div class="messages" id="message-container"></div>
        
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button class="btn" style="background: #00adb5;" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream, peerConnection, incomingOffer;
        let isSpeakerOn = false;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const callBtn = document.getElementById('call-btn');
        const answerBtn = document.getElementById('answer-btn');
        const hangupBtn = document.getElementById('hangup-btn');
        const speakerBtn = document.getElementById('speaker-btn');
        const remoteAudio = document.getElementById('remote-audio');

        socket.on('room-full', (msg) => { alert(msg); document.body.innerHTML = `<h2 style="color:red; text-align:center;">${msg}</h2>`; });

        socket.on('status-change', (status) => {
            const statusText = document.getElementById('status-text');
            statusText.innerText = status.text;
            statusText.style.color = status.online ? "#00ffcc" : "#ff4a4a";
        });

        socket.on('message', (data) => appendMessage(data.text, 'received', data.timestamp));

        async function setupMedia() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        }

        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => { remoteAudio.srcObject = event.streams[0]; };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('ice-candidate', event.candidate);
            };
        }

        async function startCall() {
            await setupMedia();
            await createPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call-user', { offer: offer });
            callBtn.style.display = 'none';
            hangupBtn.style.display = 'inline-block';
            speakerBtn.style.display = 'inline-block';
        }

        socket.on('incoming-call', async (data) => {
            incomingOffer = data.offer;
            callBtn.style.display = 'none';
            answerBtn.style.display = 'inline-block';
            hangupBtn.style.display = 'inline-block';
        });

        async function answerCall() {
            await setupMedia();
            await createPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer-call', { answer: answer });
            answerBtn.style.display = 'none';
            speakerBtn.style.display = 'inline-block';
        }

        socket.on('call-answered', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('ice-candidate', async (candidate) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        function toggleSpeaker() {
            isSpeakerOn = !isSpeakerOn;
            remoteAudio.volume = isSpeakerOn ? 1.0 : 0.2;
            speakerBtn.classList.toggle('active', isSpeakerOn);
            speakerBtn.innerText = isSpeakerOn ? "🔊 Speaker ON" : "📢 Speaker OFF";
        }

        function endCall() {
            socket.emit('end-call');
            resetCallUI();
        }

        socket.on('call-ended', () => resetCallUI());

        function resetCallUI() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            callBtn.style.display = 'inline-block';
            answerBtn.style.display = 'none';
            hangupBtn.style.display = 'none';
            speakerBtn.style.display = 'none';
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            const timestamp = new Date().toLocaleTimeString();
            appendMessage(text, 'sent', timestamp);
            socket.emit('chat-message', { text: text });
            input.value = '';
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function appendMessage(text, type, time) {
            const container = document.getElementById('message-container');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', type);
            msgDiv.innerHTML = `${text} <span class="time">${time}</span>`;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
